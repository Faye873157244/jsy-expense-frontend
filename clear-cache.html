<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-scale=1.0">
<title>强制清除所有缓存</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:'Segoe UI','Noto Sans SC',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.box{background:#1e293b;border-radius:16px;padding:40px;max-width:600px;width:100%;box-shadow:0 25px 80px rgba(0,0,0,0.5)}
h1{font-size:28px;margin-bottom:8px;color:#34d399}
.subtitle{color:#94a3b8;font-size:15px;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #334155}
.step{margin:16px 0;padding:14px;background:#0f172a;border-radius:10px;border-left:4px solid #3b82f6;font-size:14px;line-height:1.7}
.step .num{font-weight:700;color:#60a5fa;margin-right:6px}
.status{padding:12px 16px;border-radius:8px;margin:16px 0;font-size:13px;line-height:1.7}
.status.ok{background:#064e3b;color:#6ee7b7;border:1px solid #059669}
.status.err{background:#7f1d1d;color:#fca5a5;border:1px solid #dc2626}
.status.info{background:#172554;color:#93c5fd;border:1px solid #2563eb}
.btn{display:inline-block;padding:14px 36px;background:#3b82f6;color:white;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;text-decoration:none;margin-top:8px;transition:.2s}
.btn:hover{background:#2563eb}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-green{background:#16a34a}.btn-green:hover{background:#15803d}
#log{max-height:200px;overflow-y:auto;font-family:monospace;font-size:12px;background:#020617;padding:12px;border-radius:8px;margin-top:16px;color:#94a3b8;white-space:pre-wrap}
</style>
</head>
<body>

<div class="box">
<h1>🧹 强制清除 CloudStudio 缓存</h1>
<div class="subtitle">解决"文件更新后页面不变化"问题</div>

<div class="step"><span class="num">步骤 1/3</span> 点击下方按钮开始清除</div>
<div class="step"><span class="num">步骤 2/3</span> 等待所有缓存项被清除（约5-10秒）</div>
<div class="step"><span class="num">步骤 3/3</span> 看到绿色"清除成功"后点击进入系统</div>

<button id="startBtn" class="btn" onclick="doClear()">🚀 开始清除缓存</button>

<div id="result"></div>
<div id="log"></div>

<a id="goBtn" href="/index-cloud.html?t=V23" style="display:none" class="btn btn-green">✅ 清除成功 → 点击进入费用监控系统</a>
</div>

<script>
var logEl = document.getElementById('log');
var resultEl = document.getElementById('result');
function log(msg) {
  console.log('[CACHE CLEAR] ' + msg);
  logEl.textContent += '[+] ' + msg + '\n';
  logEl.scrollTop = logEl.scrollHeight;
}

async function doClear() {
  document.getElementById('startBtn').disabled = true;
  document.getElementById('startBtn').textContent = '⏳ 正在清除...请勿关闭此页';
  logEl.textContent = '';
  resultEl.innerHTML = '';

  var totalCleared = 0;
  var errors = [];

  try {
    // ===== 1. 注销所有 Service Worker =====
    log('正在注销 Service Worker...');
    var registrations = await navigator.serviceWorker.getRegistrations();
    if (registrations.length > 0) {
      for (var reg of registrations) {
        var scope = reg.scope;
        await reg.unregister();
        log('✓ 已注销 SW: ' + scope);
        totalCleared++;
      }
    } else {
      log('- 未发现已注册的 Service Worker');
    }

    // ===== 2. 清除所有 Cache Storage =====
    log('正在清除 Cache Storage...');
    if ('caches' in window) {
      var names = await caches.keys();
      for (var name of names) {
        await caches.delete(name);
        log('✓ 已删除缓存: ' + name);
        totalCleared++;
      }
    } else {
      log('- 不支持 Cache API');
    }

    // ===== 3. 清除 localStorage 中可能的缓存数据 =====
    log('正在检查 localStorage...');
    var keysToRemove = [];
    for (var i = 0; i < localStorage.length; i++) {
      var k = localStorage.key(i);
    }
    // 不删 localStorage 的业务数据，只记录

    // ===== 4. 清除 sessionStorage =====
    log('正在清除 sessionStorage...');
    sessionStorage.clear();
    log('✓ sessionStorage 已清空');
    totalCleared++;

    // ===== 5. 尝试清除 IndexedDB 中的缓存相关数据库 =====
    log('正在检查 IndexedDB...');
    if (indexedDB && indexedDB.databases) {
      try {
        var dbs = await indexedDB.databases();
        for (var db of dbs) {
          if (db.name.indexOf('cache') !== -1 || db.name.indexOf('sw-cache') !== -1 || db.name.indexOf('workbox') !== -1) {
            indexedDB.deleteDatabase(db.name);
            log('✓ 已删除 DB: ' + db.name);
            totalCleared++;
          } else {
            log('- 保留 DB: ' + db.name);
          }
        }
      } catch(e) {
        log('- IndexedDB 列出失败: ' + e.message);
      }
    }

    // ===== 结果 =====
    if (errors.length === 0) {
      resultEl.innerHTML = '<div class="status ok">✅ 清除成功！共清理 ' + totalCleared + ' 项缓存<br><br>现在可以安全地访问费用监控系统了。</div>';
      document.getElementById('goBtn').style.display = 'inline-block';
      log('');
      log('========== 全部完成 ==========');
      log('共清理 ' + totalCleared + ' 项');
      log('请点击下方按钮进入系统');
    } else {
      resultEl.innerHTML = '<div class="status err">⚠ 部分项目清除失败<br>' + errors.join('<br>') + '</div>';
      document.getElementById('goBtn').style.display = 'inline-block';
      log('');
      log('⚠ 虽然有错误，但大部分缓存已清除');
      log('建议直接尝试进入系统');
    }

  } catch(e) {
    resultEl.innerHTML = '<div class="status err">❌ 出错: ' + e.message + '</div>';
    log('ERROR: ' + e.message + '\n' + e.stack);
    document.getElementById('startBtn').disabled = false;
    document.getElementById('startBtn').textContent = '🔄 重试';
  }
}

// 页面加载时自动检测当前状态
(function(){
  log('Cache Clearer 已就绪');
  log('准备开始清除操作...');
})();
</script>
</body>
</html>
